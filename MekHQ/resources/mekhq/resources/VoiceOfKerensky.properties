voiceOfKerensky.message.ic={0}, our comms team picked up something strange last night. A faint\
  \ broadband microwave signal, buried deep in the static. At first, we thought it was background\
  \ noise or a sensor ghost, but when we cleaned it up... it''s a voice. A human voice.\
  <p>The signal is old. Incredibly old. Based on the frequency drift and propagation analysis, this\
  \ transmission has been traveling at the speed of light for... well, a very long time. It''s just\
  \ now reaching us. Here is what we were able to decode:</p>\
  <p><i>"This is General Aleksandr Kerensky, commander of the Star League Defense Force,\
  \ broadcasting to all who may hear this message.</i></p>\
  <p><i>We have arrived. After a journey that tested the limits of our endurance and our faith,\
  \ we have found a new home among the stars. The Pentagon Worlds - five worlds that will serve\
  \ as the foundation for a new beginning.</i></p>\
  <p><i>To those we left behind, know that our departure was not born of spite or cowardice.\
  \ I removed the military might of the Star League to prevent it from being used as a weapon\
  \ of conquest in the chaos that followed the Usurper''s coup. The Great Houses would have torn\
  \ themselves apart fighting over the SLDF, and the people of the Inner Sphere would have\
  \ suffered most of all.</i></p>\
  <p><i>We carry with us the ideals of the Star League - unity, justice, and the belief that\
  \ humanity deserves better than endless war. Should mankind step back from the brink of the\
  \ abyss, we shall return to once more serve and protect.</i></p>\
  <p><i>Until that day, look to the stars and know that we endure. The dream of the Star League\
  \ lives on.</i></p>\
  <p><i>Kerensky out."</i></p>\
  <p>I don''t know what to make of it, {0}. A message from Kerensky himself, sent over a thousand\
  \ years ago, just now washing over us like a wave from the past. It''s... it''s something, sir.</p>
voiceOfKerensky.message.ooc=<b>The Voice of Kerensky</b>\
  <p>On September 9, 2786, General Aleksandr Kerensky transmitted a broadband microwave radio\
  \ message from the Pentagon Worlds announcing the arrival of the Star League in Exile. Unlike\
  \ HPG transmissions, this broadcast travels at the speed of light - approximately 1 light-year\
  \ per year.</p>\
  <p>Your campaign''s current system is approximately {0} light-years from the Pentagon Worlds. The\
  \ signal wavefront has been expanding for {1} years, and has just now reached your location.</p>\
  <p>Historically, Task Force Serpent intercepted this transmission in 3059 while en route to\
  \ destroy Clan Smoke Jaguar on Huntress - a peace proclamation heard during wartime.</p>
button.acknowledge=Acknowledged
