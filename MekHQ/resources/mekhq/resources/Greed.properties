NONE.label=None
NONE.ronin=ERROR: THIS SHOULDN''T BE VISIBLE! (ronin)
ASTUTE.label=Astute
ASTUTE.ronin=I''ve always been good at seeing patterns. Some call it instinct. I call it intelligence.
ADEPT.label=Adept
ADEPT.ronin=Skill isn''t something you''re born with, it''s earned.
AVARICIOUS.label=Avaricious
AVARICIOUS.ronin=Let''s skip the niceties and get straight to business.
CORRUPT.label=Corrupt
CORRUPT.ronin=Let''s not pretend we''re playing by the rules here.
DYNAMIC.label=Dynamic
DYNAMIC.ronin=You don''t need someone who waits for orders. You need someone who moves fast, that''s me.
EAGER.label=Eager
EAGER.ronin=I''m not here to sit on the sidelines, I''m ready to get in the fight.
ENTERPRISING.label=Enterprising
ENTERPRISING.ronin=I see an opportunity here, for you and for me.
EXPLOITATIVE.label=Exploitative
EXPLOITATIVE.ronin=Let''s skip the formalities, you need results, and I know how to get them.
FRAUDULENT.label=Fraudulent
FRAUDULENT.ronin=Let me be clear, you don''t need to know the details, and I''m not going to tell you.
GENEROUS.label=Generous
GENEROUS.ronin=Let me be straight with you; I know how hard it gets out there.
GREEDY.label=Greedy
GREEDY.ronin=Let''s not waste time pretending otherwise, I''m here because you''ve got resources, and\
  \ I want in.
HOARDING.label=Hoarding
HOARDING.ronin=I''m not here to make friends, I''m here to survive.
INSATIABLE.label=Insatiable
INSATIABLE.ronin=I''ve got a problem, I want more. Always have, always will.
INSIGHTFUL.label=Insightful
INSIGHTFUL.ronin=You know what your problem is? You''ve got too many blunt instruments and not enough\
  \ sharp ones. That''s why you need me.
INTUITIVE.label=Intuitive
INTUITIVE.ronin=Some people need plans, data, and flowcharts before they act. Me? I just know.
JUDICIOUS.label=Judicious
JUDICIOUS.ronin=Rash decisions get people killed. I don''t make those.
LUSTFUL.label=Lustful
LUSTFUL.ronin=So... you''re finally reading my message? Took you long enough. I was starting to\
  \ think you didn''t know how to take a hint.
MERCENARY.label=Mercenary
MERCENARY.ronin=Look, I''m not here to join some cause or fight for a flag.
METICULOUS.label=Meticulous
METICULOUS.ronin=I''ve been looking over the specs on your unit, and let me tell you, there''s room\
  \ for improvement.
NEFARIOUS.label=Nefarious
NEFARIOUS.ronin=I hear you''ve got a reputation, the kind that comes with power and enemies.
OVERREACHING.label=Overreaching
OVERREACHING.ronin=I know what you''ve heard, that I push too hard, that I don''t know when to stop. And you know \
  what? It''s true.
PROFITABLE.label=Profitable
PROFITABLE.ronin=Some call salvage junk. Me, I call it treasure.
SAVVY.label=Savvy
SAVVY.ronin=Let me make this easy for you: you need someone who knows how to read the room, and the people in it. \
  That''s me.
SELF_SERVING.label=Self-Serving
SELF_SERVING.ronin=Let''s skip the pretense, I''m not here to make friends. I''m here to win.
SHAMELESS.label=Shameless
SHAMELESS.ronin=Let''s get one thing straight, I don''t do shame. I say what I want, I do what I want. If someone''s \
  offended? That''s their problem.
SHREWD.label=Shrewd
SHREWD.ronin=People call me ruthless, I call it efficient.
TACTICAL.label=Tactical
TACTICAL.ronin=You don''t need another blunt instrument in your unit. You need someone who understands\
  \ the battlefield, someone who knows how to control it.
THIEF.label=Thief
THIEF.ronin=Look, I''m not going to pretend I''m some paragon of virtue...
UNPRINCIPLED.label=Unprincipled
UNPRINCIPLED.ronin=You need someone who knows how to get things done, not someone who''s going to hesitate because of\
  \ some outdated notion of honor or fairness.
VORACIOUS.label=Voracious
VORACIOUS.ronin=Let''s cut to the chase. You need someone who''s not just hungry for success, you need\
  \ someone who devours it. That''s me.
