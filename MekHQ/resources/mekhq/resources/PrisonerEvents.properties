prisoners.player.victory.good.0={0}, Allied Command has successfully extracted our captured\
  \ personnel. All individuals are accounted for and currently undergoing medical evaluation.\
  \ Preliminary reports indicate varied physical conditions, with further assessments pending.\
  \ Awaiting your directive on their reintegration process.
prisoners.player.victory.good.1={0}, Allied Command reports the successful recovery of our missing\
  \ personnel. All have been transferred to a secure medical facility for debriefing and treatment.\
  \ Their current operational status remains undetermined. We will provide a full report as soon as\
  \ further information is available.
prisoners.player.victory.good.2={0}, our previously captured personnel have been retrieved by\
  \ allied forces and are now in stable condition. Medical and intelligence teams are conducting\
  \ evaluations. A follow-up report with relevant findings and recommendations will be delivered\
  \ shortly.
prisoners.player.victory.good.3={0}, Allied Command confirms the successful extraction of our\
  \ personnel from enemy custody. All individuals are currently in transit to a secure medical\
  \ facility for immediate assessment. No further action required at this time unless directed\
  \ otherwise.
prisoners.player.victory.good.4={0}, recovered personnel have been secured and are receiving\
  \ medical treatment. No operational updates at this time. Allied Command has requested a liaison\
  \ for debriefing once their conditions allow. I will follow up with further details as they\
  \ become available.
prisoners.player.victory.good.5={0}, we just got word - our people are safe. Allied Command pulled\
  \ them out, and they''re getting medical attention as we speak. It''s been a long wait, but we\
  \ finally have them back. No details yet on their condition, but they''re alive. That''s what\
  \ matters right now.
prisoners.player.victory.good.6=Good news, {0} - our missing personnel have been rescued! Allied\
  \ Command came through, and they''re bringing them home. We don''t have the full picture yet, but\
  \ they made it out. After everything, I wasn''t sure we''d see them again. This is a damn good day.
prisoners.player.victory.good.7=They did it, {0}. Allied forces got our people back. No casualties,\
  \ no more unknowns - they''re safe. Medical teams are checking them over, and we''ll know more soon,\
  \ but at least we can stop wondering. We can bring them home.
prisoners.player.victory.good.8={0}, we''ve got our people back. Allied Command pulled off the\
  \ rescue, and from the first reports, they all survived. I can''t tell you how good it feels to\
  \ say that. We''ll know more soon, but for now, I just wanted you to know - we didn''t lose them.
prisoners.player.victory.good.9=I just got confirmation, {0} - our captured personnel have been found\
  \ and rescued. They''re on their way to a secure facility, and from what we''re hearing, they''re in\
  \ stable condition. We''ve been waiting for this moment, and now it''s finally here. We''ll bring\
  \ them home soon.
prisoners.player.victory.good.10={0}, Allied Command recovered our people, but they''re different.\
  \ Medical is assessing them now, but captivity leaves scars beyond the physical. We need to be\
  \ prepared - for their sake and ours. Some may return to duty, but others... we''ll have to wait and\
  \ see.
prisoners.player.victory.good.11={0}, they''re back, but it''s not a victory yet. Allied forces\
  \ pulled them out, but we don''t know what shape they''re in. No word on injuries, no word on what\
  \ they endured. We''ll get the reports soon, but don''t expect them to just pick up where they left\
  \ off.
prisoners.player.victory.good.12={0}, our people have been recovered, but survival doesn''t mean\
  \ they''re whole. Allied Command is handling their medical care, but I''ve seen cases like this\
  \ before. They''ll need more than just time to heal. We should be ready for whatever comes next.
prisoners.player.victory.good.13={0}, they made it out, but we have to be realistic. They''ve been\
  \ prisoners for too long, and whatever happened to them won''t just fade. Medical says they''re\
  \ stable for now, but mentally? That''s another battle entirely. We should start preparing for\
  \ reintegration - or treatment.
prisoners.player.victory.good.14={0}, the rescue was successful, but it''s too soon to celebrate.\
  \ They''ve been through hell, and we don''t know what''s left of the soldiers we lost. We''ll get\
  \ them debriefed and assessed, but this isn''t over. Not for them, and not for us.
prisoners.player.victory.good.15=Well, {0}, it only took Allied Command <i>forever</i>, but they\
  \ finally pulled our people out. No details yet on how bad they''re messed up, but at least\
  \ they''re breathing. I''m sure the brass will pat themselves on the back for this one, like they\
  \ didn''t leave them rotting in a cell for weeks.
prisoners.player.victory.good.16=Guess what, {0}? Turns out Allied Command does know how to pull\
  \ off a rescue - just, you know, after dragging their feet long enough for our people to suffer.\
  \ They''re alive, but I wouldn''t call them ''okay.'' We''ll get a full report soon, assuming it isn''t\
  \ buried under classified nonsense.
prisoners.player.victory.good.17=Good news, {0} - our people are back. Bad news? We had to wait until\
  \ Allied Command finally got around to it. I''d love to say they''re in good shape, but I doubt it.\
  \ Let''s just hope they didn''t break anything - physically or mentally - too badly while they were\
  \ waiting on a rescue.
prisoners.player.victory.good.18=So, apparently, Allied Command decided today was the day they''d\
  \ remember our captured personnel exist. They pulled them out, no thanks to whatever bureaucratic\
  \ nightmare slowed things down. No idea what shape they''re in yet, but I''m sure the official\
  \ reports will be full of excuses.
prisoners.player.victory.good.19=They did it, {0}. Allied forces actually pulled off a rescue. Took\
  \ them long enough. Our people are back, but let''s not pretend this is some great victory - just\
  \ another reminder that when things go bad, we''re always at the bottom of the priority list. I''ll\
  \ have the MedTechs check on them and see what''s left.
prisoners.player.victory.good.20={0}, the rescue was successful. Our people are back, but they''ve\
  \ been through hell. Medical is looking them over now. No guarantees on who''s fit for duty, but\
  \ at least they''re alive. We''ll get them patched up and see who''s still got fight left in them.
prisoners.player.victory.good.21={0}, our personnel have been extracted. They''re breathing, but\
  \ that''s about all we know right now. No point sugarcoating it - captivity changes people. Some\
  \ will bounce back, some won''t. We''ll deal with it as it comes.
prisoners.player.victory.good.22={0}, the prisoners are back. No fatalities, but survival doesn''t\
  \ mean they''re intact. We''ll assess, adapt, and move forward. If they can fight, they fight. If\
  \ not, we figure out what''s next. Either way, we keep moving.
prisoners.player.victory.good.23=They''re back, {0}. Allied Command pulled them out, and now it''s\
  \ our turn to deal with the aftermath. No use worrying about what''s done. We check them, we get\
  \ them on their feet, and we keep going. That''s how this works.
prisoners.player.victory.good.24=Mission accomplished - our people are out. They''ll need time to\
  \ recover, but time''s a luxury we don''t always get. We''ll see who''s still got their edge and who\
  \ doesn''t. No room for dead weight in this outfit, but we owe them a chance to stand back up.
prisoners.player.victory.good.25={0}, guess who just made a dramatic comeback? Our missing folks.\
  \ Allied Command actually pulled it off, and they''re on their way back. No word yet on whether\
  \ they''re in fighting shape, but I figure after what they''ve been through, they''ve at least\
  \ earned the right to a strong drink.
prisoners.player.victory.good.26=Good news, {0} - our people are back, and despite everything,\
  \ they''re still in one piece. Physically, at least. Mentally? Well, we''ll see if captivity dulled\
  \ their sense of humor or just made it worse. Either way, we''re buying the first round when\
  \ they''re up and moving.
prisoners.player.victory.good.27=Well, look who decided to rejoin the living! Allied Command\
  \ finally yanked our folks out of whatever mess they were stuck in. They''re on the mend, and if I\
  \ know them, they''ll be cracking bad jokes about prison food before the day''s over.
prisoners.player.victory.good.28={0}, I don''t know what kind of favors you called in, but our\
  \ people are back. No fatalities, just a little worse for wear. I give it two days before they''re\
  \ trying to sneak out of medical and pretend nothing happened. We should probably chain them to the beds.
prisoners.player.victory.good.29=They made it, {0}! I''d love to say they walked out of captivity\
  \ looking heroic, but I hear most of them just collapsed into the nearest chair. Still,\
  \ they''re alive, and that''s what matters. We''ll give them time to recover - then we put them back\
  \ to work!
prisoners.player.victory.good.30={0}, Allied Command has secured our captured personnel. They are\
  \ currently undergoing medical evaluation. Their operational status remains undetermined.\
  \ Recommend prioritizing debriefing as soon as their condition allows us to assess potential\
  \ intelligence value.
prisoners.player.victory.good.31={0}, the extraction was successful. Our personnel have been\
  \ recovered with no additional casualties. Medical teams are handling immediate concerns. Once\
  \ cleared, we will need to evaluate their combat readiness and determine reintegration procedures.
prisoners.player.victory.good.32={0}, our missing personnel have been retrieved. No fatalities\
  \ reported. Their physical and psychological condition will dictate next steps. Expect a full\
  \ report within the next 24 hours, including a recommendation on their return to active duty.
prisoners.player.victory.good.33=Rescue operation confirmed successful. All personnel accounted\
  \ for. Medical is stabilizing them now. Tactical assessment required to determine if prolonged\
  \ captivity has compromised their effectiveness. Will advise once evaluations are complete.
prisoners.player.victory.good.34=Allied Command has completed retrieval of our personnel. Casualty\
  \ count remains at zero, but operational efficiency is in question. A full debrief and assessment\
  \ will follow. Until then, they are non-combat assets. Further instructions?
prisoners.player.victory.good.35={0}, they''re back. After everything, after all the waiting and not\
  \ knowing, our people are finally safe. Allied Command pulled them out, and they''re getting the\
  \ care they need. I won''t pretend they''re the same as when we lost them, but they made it home.\
  \ That''s what matters.
prisoners.player.victory.good.36={0}, we got them. Our people are alive. I can''t tell you what\
  \ they''ve been through, and honestly, I don''t think I want to know - not yet. What I do know is\
  \ that they fought to hold on, and now it''s our turn to help them find their way back.
prisoners.player.victory.good.37=They made it, {0}. Barely, maybe, but they made it. I keep\
  \ thinking about the times we talked about them like they were already gone, and now here they\
  \ are. They''re going to need us, and I won''t let them down. None of us will.
prisoners.player.victory.good.38=I won''t lie, {0} - I had my doubts. It felt like we were just\
  \ waiting for bad news, but against all odds, our people are back. They might be scarred, they\
  \ might be changed, but they''re here. And I swear, I won''t take that for granted.
prisoners.player.victory.good.39={0}, I just saw them. They''re alive, but they''ve been through more\
  \ than I can put into words. The fight didn''t end when they got captured - it just changed. Now,\
  \ it''s our turn to stand by them, to remind them that they still have a place here. We owe them\
  \ that much.
prisoners.player.victory.good.40={0}, Allied Command claims they ''rescued'' our people, but I''m not\
  \ celebrating yet. We don''t know what happened to them in captivity, what they were put through,\
  \ or what they might have said under pressure. Until we debrief them ourselves, I suggest we\
  \ treat this as an unknown variable, not a victory.
prisoners.player.victory.good.41={0}, they''re back - but something doesn''t sit right with me. Allied\
  \ Command took their sweet time getting them out, and now they''re acting like everything''s fine.\
  \ I want eyes on our people immediately. We don''t know what was done to them, what they might\
  \ have been forced into, or who they might answer to now.
prisoners.player.victory.good.42={0}, I don''t trust how this played out. Our people were prisoners\
  \ for too long, and now they''re suddenly ''safe''? The enemy doesn''t just give up prisoners without\
  \ a reason. We need to consider the possibility that this wasn''t just a rescue - it was a setup.
prisoners.player.victory.good.43=They made it out, {0}, but I have questions. Why now? Why them?\
  \ And why is Allied Command being so vague about the details? Until we know exactly what went\
  \ down, I suggest we keep them under close watch. For their sake - and ours.
prisoners.player.victory.good.44={0}, something''s off. I''ve seen men come back from captivity\
  \ before, and it''s never this clean. Either we''re missing something, or someone wants us to think\
  \ this is just another routine rescue. I say we don''t take anything at face value until we get\
  \ some real answers.
prisoners.player.victory.good.45={0}, our people are back, but the ones we lost in that prison\
  \ won''t be the same as the ones who returned. War doesn''t just take lives - it changes the ones who\
  \ survive. We got them out, but now comes the real battle: helping them find their way home, not\
  \ just physically, but mentally.
prisoners.player.victory.good.46={0}, survival is never simple. Our people are alive, but captivity\
  \ leaves marks you don''t always see. Some will talk about it, some won''t. Some will heal, some\
  \ never will. All we can do is be there when they need us - if they ever decide they do.
prisoners.player.victory.good.47={0}, they made it back, but at what cost? Time spent in the hands\
  \ of the enemy isn''t something you just walk away from. They lost something in there - maybe time,\
  \ maybe trust, maybe parts of themselves. It''s up to us to help them figure out what comes next.
prisoners.player.victory.good.48={0}, it''s easy to celebrate a rescue, to look at the numbers and\
  \ say ''we won.'' But this isn''t about numbers. It''s about the people who sat in a cell wondering\
  \ if we were coming, who faced things we''ll never fully understand. We saved them, but saving\
  isn''t the same as healing.
prisoners.player.victory.good.49={0}, war doesn''t just take - it lingers. It stays in the minds of\
  \ those who survive it, shaping them in ways they don''t always recognize. Our people are back,\
  \ but they''re carrying ghosts now. All we can do is make sure they don''t have to carry them alone.
prisoners.player.victory.bad.0={0}, prior to their withdrawal, enemy forces executed the captured\
  \ personnel. All attempts to negotiate or recover them were unsuccessful. Their remains have been\
  \ recovered where possible. Awaiting further orders on how to proceed.
prisoners.player.victory.bad.1={0}, intelligence confirms that our captured personnel were executed\
  \ by the enemy before their retreat. Recovery operations are underway, and a full report will\
  \ follow. No survivors.
prisoners.player.victory.bad.2={0}, we have confirmation that the enemy eliminated all captured\
  \ personnel before withdrawing from the area. We are securing the site now and will provide a\
  \ full accounting once the situation is stabilized.
prisoners.player.victory.bad.3={0}, it''s confirmed. The enemy executed our captured personnel\
  \ before pulling out. No one left behind. We are retrieving remains and will update you once\
  \ identification is complete.
prisoners.player.victory.bad.4={0}, the situation is as follows: all captured personnel were\
  \ executed before the enemy withdrew. We are gathering what intelligence we can from the site.\
  \ Orders regarding handling of the remains and notification of next of kin are requested.
prisoners.player.victory.bad.5={0}, it''s confirmed - our people didn''t make it. Before pulling out,\
  \ the enemy lined them up and executed them. We''ve recovered what we can, but this isn''t just a\
  \ loss, it''s a message. We need to be ready for what this does to the company.
prisoners.player.victory.bad.6={0}, we got there too late. The enemy didn''t leave any prisoners\
