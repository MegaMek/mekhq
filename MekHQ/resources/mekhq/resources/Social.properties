NONE.label=None
NONE.ronin=ERROR: THIS SHOULDN''T BE VISIBLE! (ronin)
ALTRUISTIC.label=Altruistic
ALTRUISTIC.ronin=I''m here because I believe strength isn''t about how much you can take, it''s about how much you \
  can give.
APATHETIC.label=Apathetic
APATHETIC.ronin=If you''re looking for someone passionate about the cause, you''re talking to the wrong person.
AUTHENTIC.label=Authentic
AUTHENTIC.ronin=I''m not going to waste your time with some rehearsed pitch or polished speech. That''s\
  \ for politicians.
BLUNT.label=Blunt
BLUNT.ronin=Let''s skip the formalities, they''re a waste of time.
CALLOUS.label=Callous
CALLOUS.ronin=Compassion? Mercy? Those are luxuries you can''t afford out here.
COMPASSIONATE.label=Compassionate
COMPASSIONATE.ronin=Look, I know the kind of people who survive in this business. Hardened. Ruthless.\
  \ Cold. That''s not me.
CONDESCENDING.label=Condescending
CONDESCENDING.ronin=Let''s not waste time pretending we''re equals, because we''re not.
CONSIDERATE.label=Considerate
CONSIDERATE.ronin=Nothing matters if you leave the people around you behind.
DISINGENUOUS.label=Disingenuous
DISINGENUOUS.ronin=You''ve seen it before, the smooth talkers, the charming rogues. But here''s the thing, that''s \
  why you need me.
DISMISSIVE.label=Dismissive
DISMISSIVE.ronin=Look, I''m not going to waste your time, and I''d appreciate it if you didn''t waste\
  \ mine.
ENCOURAGING.label=Encouraging
ENCOURAGING.ronin=I know how hard it gets out there, how easy it is to lose sight of why you''re\
  \ even fighting. People crack under pressure.  That''s where I come in.
ERRATIC.label=Erratic
ERRATIC.ronin=Let''s be honest, you''ve got enough predictable warriors. People who follow orders. That''s not me.
EMPATHETIC.label=Empathetic
EMPATHETIC.ronin=People aren''t just assets or liabilities to me, they''re people. And I''m good at\
  \ understanding them.
FRIENDLY.label=Friendly
FRIENDLY.ronin=You know as well as I do that trust is what holds a unit together, and I''m good at\
  \ building it.
GREGARIOUS.label=Gregarious
GREGARIOUS.ronin=Morale isn''t just about speeches and tactics, it''s about connection.
INSPIRING.label=Inspiring
INSPIRING.ronin=I''ve seen what happens when someone steps up and gives them a reason to fight.
INDIFFERENT.label=Indifferent
INDIFFERENT.ronin=I won''t waste your time with speeches or promises.
INTROVERTED.label=Introverted
INTROVERTED.ronin=I''m not the loudest person in the room, and I don''t need to be.
IRRITABLE.label=Irritable
IRRITABLE.ronin=Let me save us both some time: I don''t have patience for nonsense.
NARCISSISTIC.label=Narcissistic
NARCISSISTIC.ronin=Let''s be honest, you''d be lucky to have me on your unit.
NEGLECTFUL.label=Neglectful
NEGLECTFUL.ronin=Look, I might not be the most organized warrior you''ve got; I lose track of things sometimes...
POMPOUS.label=Pompous
POMPOUS.ronin=Let me cut through the noise, I know exactly what I bring to the table, and so does\
  \ everyone else.
PETTY.label=Petty
PETTY.ronin=Look, I''m not going to pretend to be the bigger person, because I''m not.
PERSUASIVE.label=Persuasive
PERSUASIVE.ronin=You and I both know that wars aren''t just won on the battlefield, they''re won behind closed doors.
RECEPTIVE.label=Receptive
RECEPTIVE.ronin=There''s a reason the best tacticians aren''t the loudest voices in the room, they''re\
  \ the ones who listen first.
SCHEMING.label=Scheming
SCHEMING.ronin=I''m not the type to rush in guns blazing. That''s for people without a plan.
SINCERE.label=Sincere
SINCERE.ronin=You''re getting offers from all kinds of smooth talkers, manipulators. I''m not going to give you\
  \ that. I''ll give you the truth.
SUPPORTIVE.label=Supportive
SUPPORTIVE.ronin=You''ve got your heavy hitters and your tacticians. But you need someone who''ll make sure your unit\
  \ stays standing after the dust settles.
TACTFUL.label=Tactful
TACTFUL.ronin=In this line of work, brute strength and firepower only get you so far.
UNTRUSTWORTHY.label=Untrustworthy
UNTRUSTWORTHY.ronin=I know what you''ve heard. And you''d be right to hesitate, trust isn''t exactly\
  \ my strong suit.
