# PRISONER EVENTS
## MINOR
event.ARGUMENT.message={0}, we''ve just had an incident in the holding area. Two groups of\
  \ prisoners got into a heated argument - seems to be over some kind of personal grudge. We\
  \ managed to break it up before it got physical, but tensions are still high. Recommend increased\
  \ patrols in that sector and monitoring for any signs of further conflict. Awaiting further\
  \ instructions.
response.0.ARGUMENT.button=Issue a stern warning that insubordination won''t be tolerated.
response.0.ARGUMENT.success={0}, the stern warning had the desired effect. The prisoners backed\
  \ down, and tensions in the holding area have eased. While there are still some mutterings of\
  \ discontent, the groups appear unwilling to escalate further. Order has been maintained for now.
response.0.ARGUMENT.failure={0}, the warning backfired. Rather than quelling the conflict, it only\
  \ seemed to provoke both groups further. They''ve grown defiant, blaming the guards for taking\
  \ sides. The situation in the holding area is more volatile than ever, and the guards are\
  \ struggling to maintain control.
response.1.ARGUMENT.button=Assign different holding areas to prevent further conflict.
response.1.ARGUMENT.success={0}, the groups have been assigned to separate holding areas, and the\
  \ move has successfully defused the immediate tension. Guards report that both groups are settling\
  \ down now that they''re no longer in close proximity. The situation appears stable.
response.1.ARGUMENT.failure={0}, separating the groups hasn''t resolved the issue. Instead, both\
  \ are using the distance to spread rumors and rally their allies. Guards report an increase in\
  \ hostilities, with tensions spilling into other areas of the facility. Containment is becoming\
  \ a challenge.
response.2.ARGUMENT.button=Avoid intervening. Sometimes enemies need to settle things themselves.
response.2.ARGUMENT.success={0}, the decision to let them handle their dispute on their own seems\
  \ to have worked. The groups appear to have reached an uneasy truce without further intervention.\
  \ Guards report that the situation has calmed down, and the holding area is returning to normal.
response.2.ARGUMENT.failure={0}, letting the groups work it out was a mistake. The argument\
  \ reignited and quickly escalated into a physical brawl, forcing guards to intervene. Several\
  \ prisoners and one guard sustained injuries in the chaos. The situation has been brought under\
  \ control, but the damage is done.
event.WILD_STORIES.message={0}, we''ve got an unusual situation in the holding area. One of the\
  \ prisoners has been keeping the others entertained with wild stories about daring escapes and\
  \ beating impossible odds. The guards overheard a few prisoners joking about trying their\
  \ "techniques." It might just be harmless talk, but it''s worth keeping an eye on them and their\
  \ audience. Suggest we step up vigilance and maybe isolate them if things escalate. Your call.
response.0.WILD_STORIES.button=Let them enjoy their stories. A little morale boost for the\
  \ prisoners might keep them calmer.
response.0.WILD_STORIES.success={0}, allowing the prisoners to enjoy the stories seems to have had\
  \ a positive effect. The mood in the holding area has improved, and the prisoners appear more\
  \ relaxed. Guards report no signs of the stories being taken seriously as escape plans, and\
  \ tensions are low.
response.0.WILD_STORIES.failure={0}, letting the stories continue backfired. The prisoners became\
  \ emboldened, treating the tales as inspiration rather than entertainment. Guards have overheard\
  \ more serious conversations about escape attempts, and tensions are rising in the holding area.
response.1.WILD_STORIES.button=Order the guards to interrupt the story sessions. No need to\
  \ encourage bad ideas.
response.1.WILD_STORIES.success={0}, the guards put a stop to the story sessions, and the\
  \ ringleader has been warned to keep quiet. While some prisoners grumbled, the disruption has\
  \ prevented the stories from gaining any further traction. The situation in the holding area has\
  \ stabilized.
response.1.WILD_STORIES.failure={0}, shutting down the stories sparked backlash among the\
  \ prisoners. They''re accusing the guards of trying to crush any small semblance of morale. The\
  \ ringleader is now stirring up resentment against the staff, and the mood in the holding area is\
  \ more volatile.
response.2.WILD_STORIES.button=Have your guards take note of the tales - there might be useful\
  \ intel hidden in his words.
response.2.WILD_STORIES.success={0}, the guards carefully monitored the story sessions and noted\
  \ several key details. While most of it was harmless fiction, one tale revealed a potential weak\
  \ point in the facility''s security that could have been exploited. The issue has been addressed,\
  \ and the holding area remains secure.
response.2.WILD_STORIES.failure={0}, listening in didn''t yield useful intel, but it did let the\
  \ stories continue unchecked. The prisoners are starting to view the storyteller as a leader, and\
  \ his audience has grown. Guards are reporting a subtle shift in the holding area''s dynamics,\
  \ and there''s concern it could lead to trouble.
event.TAMPERING.message={0}, we caught a prisoner tampering with a vent in the holding cells. The\
  \ breach has been patched, but the prisoner insists it was "just for better air circulation." It\
  \ doesn''t add up, and we suspect they might''ve been testing security or planning something\
  \ more. Recommend reviewing footage and increasing patrols in the area. Let me know if we should\
  \ isolate or interrogate the prisoner further.
response.0.TAMPERING.button=Punish the prisoner harshly to deter further attempts.
response.0.TAMPERING.success={0}, the prisoner was punished harshly, and the display of authority\
  \ has deterred further tampering. Guards report that the other prisoners seem intimidated, and\
  \ there have been no signs of additional security breaches. The situation appears to be under\
  \ control.
response.0.TAMPERING.failure={0}, punishing the prisoner harshly backfired. The rest of the\
  \ population viewed it as excessive, sparking outrage and minor disturbances in the holding area.\
  \ While the tampering has stopped, tensions are running high, and the guards are on edge.
response.1.TAMPERING.button=Quarantine the prisoner as a precaution.
response.1.TAMPERING.success={0}, the prisoner was moved to solitary confinement, and the holding\
  \ area has settled down. Guards report that removing him has lowered the risk of coordinated\
  \ tampering, and no further incidents have been observed. The facility is stable for now.
response.1.TAMPERING.failure={0}, moving the prisoner to solitary has only fueled rumors among the\
  \ population. Many believe he was punished unfairly, and whispers of unrest are spreading. Guards\
  \ are reporting increased hostility from the other prisoners, and tensions are rising.
response.2.TAMPERING.button=There''s no harm done - this time.
response.2.TAMPERING.success={0}, the decision to let the incident slide has de-escalated the\
  \ situation. The prisoner has returned to their cell without further issue, and the holding area\
  \ is calm. Guards are keeping a close watch, but so far, there''s no indication of additional\
  \ tampering.
response.2.TAMPERING.failure={0}, letting the prisoner off the hook has emboldened the population.\
  \ Guards are reporting more frequent tampering attempts, and the holding area has grown more\
  \ chaotic. It''s clear the prisoners view the lack of consequences as a sign of weakness.
event.CONVERSATIONS.message={0}, my men have reported overhearing strange conversations among the\
  \ prisoners. One of them seems to be passing coded messages to others - nothing explicit, but\
  \ it''s clear they''re trying to keep it under the radar. We haven''t cracked what they''re\
  \ saying yet, but it might be worth isolating the suspected messenger and monitoring closely.\
  \ Advise on next steps.
response.0.CONVERSATIONS.button=Assign a guard to decipher the code and gather intelligence.
response.0.CONVERSATIONS.success={0}, the guard assigned to monitor the conversations successfully\
  \ cracked the code. It appears the prisoners were attempting to coordinate a minor disruption,\
  \ but the plot was uncovered before it could be executed. The suspected prisoners have been\
  \ isolated, and the facility remains secure.
response.0.CONVERSATIONS.failure={0}, the attempt to monitor the prisoners failed. The coded\
  \ messages were too cryptic to decipher in time, and it''s clear the prisoners have become more\
  \ cautious. Guards are now reporting increased coordination among the population, indicating a\
  \ potential larger scheme.
response.1.CONVERSATIONS.button=Confront the suspected prisoner directly.
response.1.CONVERSATIONS.success={0}, the interrogation revealed the ringleader''s plans. They\
  \ admitted to attempting to organize a coordinated effort to disrupt the guards but folded under\
  \ pressure. The operation was dismantled, and the ringleader has been isolated. Order has been\
  \ restored in the holding area.
response.1.CONVERSATIONS.failure={0}, the interrogation yielded no useful information. The\
  \ ringleader refused to cooperate, and their defiance has only emboldened the other prisoners.\
  \ Guards report an uptick in suspicious behavior, and tensions in the holding area are rising.
response.2.CONVERSATIONS.button=The guards are stretched thin - focus on bigger problems.
response.2.CONVERSATIONS.success={0}, ignoring the coded conversations seems to have been the right\
  \ call. Guards report no unusual behavior since, and the suspected ringleader has not attempted\
  \ further communication. The situation appears stable, and the holding area is calm for now.
response.2.CONVERSATIONS.failure={0}, ignoring the situation was a mistake. The prisoners used the\
  \ opportunity to coordinate more effectively, and guards are now reporting suspicious activity\
  \ across multiple sections of the facility. Whatever they were planning has likely escalated.
event.RATIONS.message={0}, we''ve got a situation with the prisoners complaining about the rations,\
  \ saying they''re insufficient. A handful of them have refused to eat and are demanding changes\
  \ before they cooperate. So far, it''s contained, but this could escalate if more prisoners join\
  \ in. Requesting guidance on how to proceed - do we negotiate, enforce compliance, or handle this\
  \ another way?
response.0.RATIONS.button=Give them extra rations. Better-fed prisoners are less likely to cause problems.
response.0.RATIONS.success={0}, providing extra rations successfully defused the situation. The\
  \ prisoners are visibly calmer, and guards report that even the most vocal protestors have\
  \ resumed eating. While this approach taxed the supply line slightly, it has restored order in\
  \ the holding area.
response.0.RATIONS.failure={0}, the decision to provide extra rations backfired. The prisoners took\
  \ it as a sign of weakness, and now even more are making demands. Guards are struggling to\
  \ maintain control as the holding area grows increasingly restless.
response.1.RATIONS.button=Rations are fine as they are. They''ll eat when they''re hungry enough.
response.1.RATIONS.success={0}, sticking to the established rations worked as intended. The\
  \ protesting prisoners have begun eating again, realizing their demands wouldn''t be met.\
  \ Guards report that tensions have eased, and the situation is back under control.
response.1.RATIONS.failure={0}, refusing to adjust the rations has escalated the conflict. More\
  \ prisoners are joining the protest, and several have started inciting unrest among the\
  \ population. Guards are reporting increased hostility, and the holding area is becoming\
  \ volatile.
response.2.RATIONS.button=Check with your quartermaster - are the prisoners being shorted?
response.2.RATIONS.success={0}, the investigation revealed that an issue in the supply chain was\
  \ indeed shorting the prisoners'' rations. Once corrected, the prisoners calmed down, and the\
  \ protest ended peacefully. The guards are now monitoring distribution to ensure this doesn''t\
  \ happen again.
response.2.RATIONS.failure={0}, the investigation revealed no discrepancies in the supply line, but\
  \ the delay in addressing the situation emboldened the prisoners. Guards report that tensions have\
  \ escalated, and the protest has spread to a larger portion of the population.
event.TRADE.message={0}, we''ve uncovered a growing contraband trade among the prisoners. They''re\
  \ exchanging messages, trinkets, and even scraps of clothing. So far, it looks harmless, but\
  \ the scale is increasing, and we''re concerned it might lead to something bigger. Recommend\
  \ stepping up inspections and confiscating the items before it becomes a larger security risk.\
  \ Awaiting your instructions.
response.0.TRADE.button=Shut the operation down and punish the traders.
response.0.TRADE.success={0}, the guards conducted a sweep of the holding area, confiscating all\
  \ contraband and punishing those involved in the trade. The operation sent a clear message, and\
  \ the prisoners seem deterred from further attempts. The holding area is secure, and order has\
  \ been restored.
response.0.TRADE.failure={0}, confiscating the contraband caused an uproar among the prisoners.\
  \ They viewed the operation as excessive and retaliated by organizing protests and refusing to \
  cooperate. Guards are reporting increased hostility, and tensions in the holding area are at a\
  \ breaking point.
response.1.TRADE.button=Small trades keep them occupied and less likely to start trouble.
response.1.TRADE.success={0}, allowing the small trades to continue has kept the prisoners occupied\
  \ and relatively peaceful. Guards report no signs of escalation, and the contraband trade appears\
  \ to be more of a distraction than a threat. The holding area remains stable for now.
response.1.TRADE.failure={0}, ignoring the contraband trade backfired. The operation grew larger\
  \ and more organized, eventually leading to the discovery of weapons and tools that could pose a\
  \ serious security threat. The guards are now scrambling to contain the fallout from this\
  \ oversight.
response.2.TRADE.button=Assign guards to oversee and profit from the contraband trade.
response.2.TRADE.success={0}, assigning guards to oversee the contraband trade allowed us to keep\
  \ the operation contained and under control. The prisoners are satisfied with their ability to\
  \ trade, and the guards are using the oversight to gather intelligence. The holding area is calm,\
  \ and no security risks have emerged.
response.2.TRADE.failure={0}, attempting to control the contraband market backfired. The guards''\
  \ involvement was discovered, leading to accusations of corruption from both prisoners and staff.\
  \ The resulting unrest has destabilized the holding area, and trust in our authority is eroding.
event.DRAINED.message={0}, one of my guards has reported feeling drained after extended shifts\
  \ managing the prisoners, particularly with the recent uptick in unruly behavior. Morale across\
  \ the security team seems to be slipping - some of the others are showing signs of frustration as\
  \ well. We may need to adjust the rotation schedule or provide some kind of support to prevent\
  \ burnout. Requesting guidance on how to proceed.
response.0.DRAINED.button=Reassign guards temporarily to less stressful duties.
response.0.DRAINED.success={0}, reassigning guards to less stressful duties has worked wonders for\
  \ morale. The team appears more rested and capable of handling the challenges in the holding\
  \ area. The improved rotation schedule has restored order among the staff without compromising\
  \ security.
response.0.DRAINED.failure={0}, reassigning guards caused a staffing shortage in critical areas. The\
  \ reduced presence in the holding area emboldened the prisoners, and guards report an increase in\
  \ unruly behavior. Morale among the remaining staff has only worsened under the added pressure.
response.1.DRAINED.button=Provide extra incentives, meals, or small comforts to improve morale.
response.1.DRAINED.success={0}, providing incentives like additional rest periods, better meals,\
  \ and small bonuses has revitalized the security team. The guards feel recognized for their\
  \ efforts, and morale has improved significantly. With spirits lifted, discipline has been\
  \ restored in the holding area.
response.1.DRAINED.failure={0}, the attempt to boost morale failed. The incentives were seen as too\
  \ little, too late, and some guards felt insulted by the gesture. Frustration continues to mount,\
  \ and discipline is slipping further. The holding area is becoming more volatile as the security\
  \ team struggles to stay focused.
response.2.DRAINED.button=Toughen them up. Remind your team that discipline is part of the job.
response.2.DRAINED.success={0}, a firm reminder about discipline and duty has strengthened the\
  \ guards'' resolve. While the workload remains heavy, the team has stepped up to the challenge\
  \ and regained control of the holding area. Morale is holding steady, and order has been\
  \ maintained.
response.2.DRAINED.failure={0}, pushing the guards harder backfired. The team is now visibly\
  \ exhausted, and several guards have voiced resentment about the lack of support. Morale has\
  \ deteriorated further, and the risk of errors in the holding area is increasing rapidly.
event.RESCUE.message={0}, a prisoner is stirring up trouble in the holding area. They''ve been\
  \ loudly proclaiming that their "rescue is imminent," and it''s starting to catch the attention\
  \ of other prisoners. I''m concerned his defiance might inspire further unrest if we don''t\
  \ address it quickly. Recommend isolating him or taking measures to shut this down before it\
  \ escalates. Awaiting your orders.
response.0.RESCUE.button=Put the officer in solitary confinement to quiet his voice.
response.0.RESCUE.success={0}, the prisoner was moved to solitary confinement, cutting off his\
  \ ability to spread rumors. Without his influence, the holding area has calmed down. Guards\
  \ report that the remaining prisoners seem less agitated, and the risk of unrest has been\
  \ minimized.
response.0.RESCUE.failure={0}, moving the prisoner to solitary confinement only fueled the rumors.\
  \ The other prisoners now believe his claims even more strongly, assuming we''re trying to\
  \ silence the truth. Guards report increased hostility, and tensions in the holding area are on\
  \ the rise.
response.1.RESCUE.button=Allow your men to refute his claims in front of the prisoners.
response.1.RESCUE.success={0}, officers publicly refuted the prisoner''s claims, pointing out\
  \ inconsistencies in his story and challenging him to provide proof. The performance discredited\
  \ him in the eyes of the other prisoners, who have started ignoring his outbursts. The holding\
  \ area is stable once again.
response.1.RESCUE.failure={0}, the public debate backfired. The prisoner used the opportunity to rally\
  \ support, twisting the officers'' words to strengthen his narrative. The other prisoners seem\
  \ emboldened, and guards are struggling to contain the unrest spreading through the holding area.
response.2.RESCUE.button=Let him rant. His words will ring hollow when no rescue arrives.
response.2.RESCUE.success={0}, allowing the prisoner to continue ranting proved effective. With no\
  \ rescue arriving, his claims began to sound hollow, and the other prisoners lost interest.\
  \ Guards report that the holding area has returned to normal, and the prisoner''s influence has\
  \ faded.
response.2.RESCUE.failure={0}, ignoring the prisoner''s outbursts was a mistake. His confidence and\
  \ persistence convinced the other prisoners that a rescue was indeed imminent. The population is\
  \ now agitated, and guards are reporting signs of coordinated unrest. The situation is\
  \ deteriorating.
event.REPAIRS.message={0}, one of the prisoners is claiming to have experience repairing combat\
  \ units. They''ve offered to assist in exchange for improved rations and better living conditions.\
  \ Could be an opportunity to make use of their skills, but there''s always the risk they''re\
  \ overstating their abilities - or worse, planning something. Recommend evaluating their\
  \ background and skills before making a decision. Let me know how you want to proceed.
response.0.REPAIRS.button=Allow him limited access to a workshop under heavy supervision.
response.0.REPAIRS.success={0}, the prisoner was granted limited access to the workshop under\
  \ strict supervision. It turns out his claims were genuine. He repaired several critical base\
  \ components, saving valuable time and resources. The guards reported no incidents, and the\
  \ operation was a success.
response.0.REPAIRS.failure={0}, allowing the prisoner into the workshop was a mistake. He sabotaged\
  \ several base components before being caught, leaving the equipment in worse condition than\
  \ before. The guards restrained him before he could do further damage, but the incident has raised\
  \ questions about our screening process.
response.1.REPAIRS.button=Keep him locked up. It''s too risky to trust a prisoner with that kind of\
  \ access.
response.1.REPAIRS.success={0}, the decision to keep the prisoner locked up was prudent. Guards\
  \ later found compound schematics in his cell, indicating he was likely planning to sabotage our\
  \ systems rather than repair them. The holding area remains secure, and the situation is under\
  \ control.
response.1.REPAIRS.failure={0}, denying the prisoner access backfired. News of his offer spread\
  \ among the population, and now many prisoners are accusing us of wasting their talents. Tensions\
  \ in the holding area are rising, and guards are reporting an uptick in defiance and minor\
  \ disruptions.
response.2.REPAIRS.button=Test his knowledge. Ask him a series of questions to gauge his expertise.
response.2.REPAIRS.success={0}, the prisoner''s answers to the technical questions confirmed his\
  \ expertise. His knowledge appears to be legitimate, and granting him supervised access to the\
  \ workshop could be a safe way to capitalize on his skills. The guards report no unusual behavior\
  \ from him so far.
response.2.REPAIRS.failure={0}, the prisoner''s answers to the test were convincing at first, but upon\
  \ closer inspection, they were riddled with inaccuracies. It''s clear he was bluffing. Guards\
  \ report that the other prisoners are mocking him, and the holding area is calmer now that his\
  \ credibility has been shattered.
event.SICKNESS.message={0}, several prisoners have come down with unexplained symptoms - weakness,\
  \ coughing, and fatigue. I''m concerned it could spread, but the prisoners are blaming the\
  \ conditions in the holding cells. We''ve isolated the affected individuals for now, but we may\
  \ need to investigate further to rule out a larger issue. Requesting advice on next steps to\
  \ contain this and maintain order.
response.0.SICKNESS.button=Prevent further spread by isolating the afflicted prisoners.
response.0.SICKNESS.success={0}, the quarantine was effective. The symptoms were contained to the\
  \ isolated group, and no new cases have emerged. Guards ensured the process was orderly, and the\
  \ holding area is stable. The prisoners seem to understand the necessity of the measure, and\
  \ tensions remain low.
response.0.SICKNESS.failure={0}, the quarantine caused a panic among the remaining prisoners, who\
  \ now fear they might be next. Guards report unrest in the holding area, with several prisoners\
  \ accusing us of neglect and inhumane treatment. The symptoms have begun appearing outside the\
  \ quarantine as well, suggesting it may have already spread.
response.1.SICKNESS.button=Allow better ventilation and clean water to improve health.
response.1.SICKNESS.success={0}, allowing better ventilation and providing clean water has\
  \ alleviated the symptoms. The affected prisoners are recovering, and the others seem more at\
  \ ease now that the conditions have been addressed. Guards report a noticeable improvement in\
  \ morale across the holding area.
response.1.SICKNESS.failure={0}, the effort to improve conditions was too little, too late. The\
  \ symptoms have continued to spread, and the remaining prisoners now view this as a sign of\
  \ weakness. Tensions are climbing in the holding area, and the guards are struggling to maintain\
  \ control.
response.2.SICKNESS.button=Let nature take its course - this could reduce the number of prisoners\
  \ causing trouble.
response.2.SICKNESS.success={0}, waiting it out proved to be the right decision. The symptoms\
  \ subsided on their own, and the affected prisoners have returned to their cells without further\
  \ incident. The guards have resumed normal operations, and the holding area remains stable.
response.2.SICKNESS.failure={0}, waiting it out was a disastrous decision. The illness spread rapidly,\
  \ overwhelming both the prisoners and the guards. The holding area is in chaos, and guards are\
  \ struggling to contain the unrest. Several prisoners have accused us of intentionally letting\
  \ this happen, further destabilizing the situation.
event.VETERAN.message={0}, we''ve got a situation involving one of the prisoners and a guard.\
  \ The prisoner recognized them from a previous campaign, and the two exchanged some tense words.\
  \ Sounds like there''s some unresolved history that could cause friction if it escalates.\
  \ Recommend keeping them separated for now and determining if this history poses a security risk.\
  \ Let me know how you want to handle it.
response.0.VETERAN.button=Personal matters aren''t your concern.
response.0.VETERAN.success={0}, allowing the prisoner and the guard to handle it themselves\
  \ appears to have resolved the tension. The two exchanged a few more sharp words but ultimately\
  \ backed down without further incident. The holding area remains calm, and guards report no\
  \ additional issues.
