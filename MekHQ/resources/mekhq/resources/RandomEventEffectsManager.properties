result.ooc=Closing or canceling this conversation will automatically pick the first option.\
  <p>Normally this situation will be caused by low <a href=''GLOSSARY:PRISONER_CAPACITY''>Prisoner Capacity</a>. If that\
  \ is the case, consider hiring infantry units and assigning them to a a <a href=''GLOSSARY:COMBAT_TEAMS''>Security\
  \ Formation</a></p>\
  <p>If you are holding at least 25 prisoners there is a small chance they will cause trouble, even if you are within\
  \ capacity.</p>
