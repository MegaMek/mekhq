# Resource bundle for the Company Generation dialog and its tabs.
#
# Conventions:
# * Tab titles use ``{tabName}.title``.
# * Sub-panel titled-border captions use ``lbl{name}.text``.
# * Control text and tooltips use ``lbl{name}.text`` / ``lbl{name}.tooltip``.
#
# The styled components in mekhq.gui.companyGeneration.components.* read from this bundle (selected
# via CompanyGenerationUtilities.getCompanyGenerationResourceBundle()). CampaignOptions counterparts
# read from CampaignOptionsDialog.properties.

